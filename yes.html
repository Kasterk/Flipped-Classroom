<!DOCTYPE html>
<html>
    <head>
        <link href="style.css" rel="stylesheet" type="text/css">
        <title>Hungry</title>
    </head>

    <body>

        <a href="index.html"><img src="arrow.webp" alt="Arrow" class="arrow"></a>
        <h1 class="text">Here is your food!</h1>

        <!-- <style> is used to define CSS styles for the HTML document within the document itself -->
        <style>
            body {
                background-color: lightgreen;
            }
        </style>

    </body>
</html>
