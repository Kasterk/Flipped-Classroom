<!DOCTYPE html>
<!-- this is the DOCTYPE declaration and is needed to define the HTML version -->
<html>
    <!-- container for metadata (information about the webpage that is not displayed) -->
    <head>
        <!-- sets the page title shown in the browser tab -->
        <title>Flipped Classroom</title>
        <!-- 
        link is used to link external resources to the current document
        href is used to specify the URL of the linked resource
        rel is used to specify the relationship between the current document and the linked resource
        type is used to specify the media type of the linked resource
        -->
        <link href="style.css" rel="stylesheet" type="text/css">
    </head>
    <!-- contains all the contents of an html document, everything that is displayed on the webpage -->
    <body>
        <!-- Heading 1, also have h2 - h6 -->
        <h1>Are you hungry?</h1>
        <!-- 
        container for flow content, has no effect on the content or layout until styled with CSS 
        classes are reusable and can be applied to multiple elements, while ids are unique and should only be used for one element on a page
        -->
        <div id="button">
            <!-- creates a hyperlink to web pages, files, locations, etc -->
            <a href="yes.html" id="yes">Yes</a>
            <a href="no.html" id="no">No</a>
        </div>

    </body>
</html>
<!-- angle brackets -->
